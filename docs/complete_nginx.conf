# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 1024M; # 设置http块下允许的最大请求体大小为1024M
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /etc/nginx/conf.d/*.conf;

    server {
        listen 80;
        server_name 39.106.4.251;

        # =========================================================
        # CloudPan 网盘系统配置 (新增)
        # =========================================================

        # 1. CloudPan 前端静态资源
        # 访问地址: http://39.106.4.251/cloudpan
        location /cloudpan {
            alias /var/www/cloudpan;
            index index.html;
            try_files $uri $uri/ /cloudpan/index.html;
        }

        # 2. CloudPan 后端接口代理
        # 接口地址: http://39.106.4.251/cloudpan-api/...
        location /cloudpan-api/ {
            # 将 /cloudpan-api/xxx 重写为 /api/xxx 转发给后端
            proxy_pass http://127.0.0.1:8080/api/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 增加超时时间，防止大文件上传下载中断
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            
            # 允许大文件上传
            client_max_body_size 1024M;
        }

        # =========================================================
        # 原有配置 (保持不变)
        # =========================================================

        location /webtwo{
            proxy_pass http://127.0.0.1:5001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时配置（解决504问题）
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;

            # 核心修复：改写后端重定向路径，补全/webtwo前缀
            # 通用规则：将5001返回的所有根路径重定向替换为/webtwo/
            proxy_redirect http://127.0.0.1:5001/ /webtwo/;
            # 精准匹配：专门处理/login的重定向（可选，增强兼容性）
            # 关键：将 Flask 返回的重定向头（如 /login）替换为 /webtwo/login
            proxy_redirect /login /webtwo/login;
            proxy_redirect /register /webtwo/register;
            proxy_redirect /dashboard /webtwo/dashboard;
            proxy_redirect /plan/ /webtwo/plan/;
            # 通用匹配：所有 /xxx 重定向替换为 /webtwo/xxx（兜底）
            proxy_redirect ~^/(.*)$ /webtwo/$1;
        }

        # 处理 /zhongxinyi 路径
        location /zhongxinyi {
            alias /var/www/zhongxinyi/;
            index aboutShe.html;
            
            # 处理访问根路径的情况
            if ($uri = /zhongxinyi) {
                return 302 /zhongxinyi/aboutShe.html;
            }
            if ($uri = /zhongxinyi/) {
                return 302 /zhongxinyi/aboutShe.html;
            }
            
            # 确保能访问到文件
            try_files $uri =404;
        }

        # 处理 /2026taokeXNKL663 路径
        location /2026taokeXNKL663 {
            alias /var/www/2026taokeXNKL663/;
            index index.html;
            
            # 处理访问根路径的情况
            if ($uri = /2026taokeXNKL663) {
                return 302 /2026taokeXNKL663/index.html;
            }
            if ($uri = /2026taokeXNKL663/) {
                return 302 /2026taokeXNKL663/index.html;
            }
            
            # 确保能访问到文件
            try_files $uri =404;
        }

        # 处理 /2026wangtongXNKL652 路径
        location /2026wangtongXNKL652 {
            alias /var/www/2026wangtongXNKL652/;
            index index.html;
            
            # 处理访问根路径的情况
            if ($uri = /2026wangtongXNKL652) {
                return 302 /2026wangtongXNKL652/index.html;
            }
            if ($uri = /2026wangtongXNKL652/) {
                return 302 /2026wangtongXNKL652/index.html;
            }
            
            # 确保能访问到文件
            try_files $uri =404;
        }

        # 处理 /2026yangqinghongXNKL336 路径
        location /2026yangqinghongXNKL336 {
            alias /var/www/2026yangqinghongXNKL336/;
            index index.html;
            
            # 处理访问根路径的情况
            if ($uri = /2026yangqinghongXNKL336) {
                return 302 /2026yangqinghongXNKL336/index.html;
            }
            if ($uri = /2026yangqinghongXNKL336/) {
                return 302 /2026yangqinghongXNKL336/index.html;
            }
            
            # 确保能访问到文件
            try_files $uri =404;
        }

        # 处理 /2026youbowenXNKL626 路径
        location /2026youbowenXNKL626 {
            alias /var/www/2026youbowenXNKL626/;
            index index.html;
            
            # 处理访问根路径的情况
            if ($uri = /2026youbowenXNKL626) {
                return 302 /2026youbowenXNKL626/index.html;
            }
            if ($uri = /2026youbowenXNKL626/) {
                return 302 /2026youbowenXNKL626/index.html;
            }
            
            # 确保能访问到文件
            try_files $uri =404;
        }

        # 处理 /2026zhangdianXNKL269 路径
        location /2026zhangdianXNKL269 {
            alias /var/www/2026zhangdianXNKL269/;
            index index.html;
            
            # 处理访问根路径的情况
            if ($uri = /2026zhangdianXNKL269) {
                return 302 /2026zhangdianXNKL269/index.html;
            }
            if ($uri = /2026zhangdianXNKL269/) {
                return 302 /2026zhangdianXNKL269/index.html;
            }
            
            # 确保能访问到文件
            try_files $uri =404;
        }

        # 2. 其他所有路径（非/zhongxinyi）代理到后端5000端口
        location / {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时配置（解决504问题）
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;
        }

        # 错误页面配置
        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;  # Nginx默认静态文件目录
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # 日志配置（同时记录到全局日志和独立日志）
        access_log /var/log/nginx/access.log main;  # 全局日志（使用http块定义的main格式）
        access_log /var/log/nginx/zhongxinyi_access.log;  # 独立日志（保留原有配置）
    }
}
